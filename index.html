<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>My Journal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">


<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  margin: 0;
  color: #333;
  font-size: 20px; /* ✅ 요청 반영 */
}

main { /* ✅CSS의미하는듯? */

  width: 90%;
  margin: 30px auto;
}


h1 {
  font-size: 20px;
}

input, textarea {
  width: 100%;
  border: none;
  outline: none;
  margin-top: 8px;
  font-size: 20px;
}

textarea {
  height: 80px;
}
<textarea id="content" placeholder="내용"></textarea>

<input type="file" id="imageInput" accept="image/*"> ✅

<button id="saveBtn">저장</button>

  

button {
  margin-top: 10px;
  background: #eee;
  border: none;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 6px;
  font-size: 16px;
} ✅ 닫기


.entry {
  border-top: 1px solid #eee;
  padding: 10px 0;
  position: relative;
}

.date {
  font-size: 8px;
  color: #aaa;
}

.actions {
  position: absolute;
  right: 0;
  top: 5px;
}

.tag {
  display: inline-block;
  background: #f1f1f1;
  padding: 2px 5px;
  margin-right: 4px;
  border-radius: 4px;
}
</style>

</head>

<body>

<main>
<h1>📓 My Journal</h1>

<textarea id="content" placeholder="내용"></textarea>
<input id="title" placeholder="제목">
<button id="saveBtn">저장</button>

<div id="list"></div>

<!-- ✅ 아래쪽으로 이동 (요청 반영) -->
<input id="tagInput" placeholder="태그 (#오늘 #기분)" style="margin-top:15px; font-size:12px;">
<input id="search" placeholder="검색..." style="margin-top:5px; font-size:12px;">

</main>

<script>
const imageInput = document.getElementById("imageInput");
``
const list = document.getElementById("list");
const titleInput = document.getElementById("title");
const contentInput = document.getElementById("content");
const tagInput = document.getElementById("tagInput");
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

// ✅ 저장 버튼 (에러 수정 완료)
document.getElementById("saveBtn").onclick = function () {

  const title = titleInput.value;
  const content = contentInput.value;
  const file = imageInput.files[0];

  if (!title || !content) {
    alert("내용 입력하세요");
    return;
  }

  if (file) {
    const reader = new FileReader();

    reader.onload = function (e) {
      createEntry(title, content, e.target.result);
      saveData();
    };

    reader.readAsDataURL(file);

  } else {
    createEntry(title, content, null);
    saveData();
  }

  titleInput.value = "";
  contentInput.value = "";
  imageInput.value = "";
};

// 엔트리 생성

entry.innerHTML = `
  <div class="actions">
  ...

    <strong>${title}</strong>
    <p>${content}</p>
    ${image ? `<img src="${image}" style="width:100%; margin-top:10px;">` : ""}
    <div class="date">${new Date().toLocaleDateString()}</div>
  `;

  list.prepend(entry);
}

  entry.innerHTML = `
    <div class="actions">
      <button class="edit">수정</button>
      <button class="delete">삭제</button>
    </div>
    <strong>${title}</strong>
    <p>${content}</p>
    <div>${createTags(tags)}</div>
    <div class="date">${date}</div>
  `;

  entry.querySelector(".delete").onclick = function () {
    entry.remove();
    saveData();
  };

  entry.querySelector(".edit").onclick = function () {
    const newTitle = prompt("제목 수정", title);
    const newContent = prompt("내용 수정", content);
    const newTags = prompt("태그 수정", tags);

    if (newTitle && newContent) {
      entry.querySelector("strong").innerText = newTitle;
      entry.querySelector("p").innerText = newContent;
      entry.querySelector("div").innerHTML = createTags(newTags);
      saveData();
    }
  };

  list.prepend(entry);
}

// 태그 생성
function createTags(tagText) {
  if (!tagText) return "";
  return tagText.split(" ").map(t => `<span class="tag">${t}</span>`).join("");
}

// 저장
function saveData() {
  localStorage.setItem("journal", list.innerHTML);
}

// 불러오기
function loadData() {
  list.innerHTML = localStorage.getItem("journal") || "";

  document.querySelectorAll(".delete").forEach(btn => {
    btn.onclick = function () {
      btn.parentElement.parentElement.remove();
      saveData();
    };
  });

  document.querySelectorAll(".edit").forEach(btn => {
    btn.onclick = function () {
      const entry = btn.parentElement.parentElement;
      const title = entry.querySelector("strong").innerText;
      const content = entry.querySelector("p").innerText;

      const newTitle = prompt("제목 수정", title);
      const newContent = prompt("내용 수정", content);

      if (newTitle && newContent) {
        entry.querySelector("strong").innerText = newTitle;
        entry.querySelector("p").innerText = newContent;
        saveData();
      }
    };
  });
}

// 검색
document.getElementById("search").oninput = function () {
  const keyword = this.value.toLowerCase();

  document.querySelectorAll(".entry").forEach(entry => {
    entry.style.display =
      entry.innerText.toLowerCase().includes(keyword) ? "block" : "none";
  });
};

loadData();
</script>

</body>
</html>
