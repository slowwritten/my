<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>My Journal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  margin: 0;
  color: #333;
  font-size: 16px;
}

main {
  width: 90%;
  margin: 30px auto;
}

/* 헤더 */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h1 {
  font-size: 22px;
}

#searchToggle {
  background: none;
  font-size: 20px;
}

/* 입력 */
input, textarea {
  width: 100%;
  border: none;
  outline: none;
  margin-top: 8px;
  font-size: 14px;
}

textarea {
  height: 80px;
}

/* 검색창 */
#searchInput {
  display: none;
  width: 100%;
  margin-top: 10px;
  padding: 6px;
  border-bottom: 1px solid #ddd;
}

/* 버튼 */
button {
  margin-top: 10px;
  background: #eee;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
}

/* 리스트 */
#list {
  margin-top: 30px;
}

.entry {
  border-top: 1px solid #eee;
  padding: 15px 0;
}

.date {
  font-size: 10px;
  color: #aaa;
}

img {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
}
</style>

</head>

<body>

<main>

<div class="header">
  <h1>📓 My Journal</h1>
  <button id="searchToggle">🔍</button>
</div>

<input id="searchInput" placeholder="검색 (제목/내용)">

<input id="title" placeholder="제목">
<textarea id="content" placeholder="내용"></textarea>

<input type="file" id="imageInput" accept="image/*">

<button id="saveBtn">저장</button>

<div id="list"></div>

</main>

<script>
const list = document.getElementById("list");
const titleInput = document.getElementById("title");
const contentInput = document.getElementById("content");
const imageInput = document.getElementById("imageInput");
const searchToggle = document.getElementById("searchToggle");
const searchInput = document.getElementById("searchInput");

/* 🔍 검색 토글 */
searchToggle.onclick = function () {
  if (searchInput.style.display === "none" || searchInput.style.display === "") {
    searchInput.style.display = "block";
    searchInput.focus();
  } else {
    searchInput.style.display = "none";
    searchInput.value = "";

    // 전체 다시 보이기
    document.querySelectorAll(".entry").forEach(e => {
      e.style.display = "block";
    });
  }
};

/* 🔍 검색 기능 */
searchInput.oninput = function () {
  const keyword = this.value.toLowerCase();

  document.querySelectorAll(".entry").forEach(entry => {
    entry.style.display =
      entry.innerText.toLowerCase().includes(keyword) ? "block" : "none";
  });
};

/* ✅ 저장 */
document.getElementById("saveBtn").onclick = function () {

  const title = titleInput.value;
  const content = contentInput.value;
  const file = imageInput.files[0];

  if (!title || !content) {
    alert("내용 입력하세요");
    return;
  }

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      addEntry(title, content, e.target.result);
    };
    reader.readAsDataURL(file);
  } else {
    addEntry(title, content, null);
  }

  titleInput.value = "";
  contentInput.value = "";
  imageInput.value = "";
};

/* ✅ 엔트리 추가 */
function addEntry(title, content, image) {
  const entry = document.createElement("div");
  entry.className = "entry";

  entry.innerHTML = `
    <strong>${title}</strong>
    <p>${content}</p>
    ${image ? `<img src="${image}">` : ""}
    <div class="date">${new Date().toLocaleString()}</div>

    <button class="edit">수정</button>
    <button class="delete">삭제</button>
  `;

  entry.querySelector(".delete").onclick = function () {
    entry.remove();
    saveData();
  };

  entry.querySelector(".edit").onclick = function () {
    const newTitle = prompt("제목 수정", title);
    const newContent = prompt("내용 수정", content);

    if (newTitle && newContent) {
      entry.querySelector("strong").innerText = newTitle;
      entry.querySelector("p").innerText = newContent;
      saveData();
    }
  };

  list.prepend(entry);
  saveData();
}

/* ✅ 저장 */
function saveData() {
  localStorage.setItem("journal", list.innerHTML);
}

/* ✅ 불러오기 */
function loadData() {
  list.innerHTML = localStorage.getItem("journal") || "";

  // 삭제 다시 연결
  document.querySelectorAll(".delete").forEach(btn => {
    btn.onclick = function () {
      btn.parentElement.remove();
      saveData();
    };
  });

  // 수정 다시 연결
  document.querySelectorAll(".edit").forEach(btn => {
    btn.onclick = function () {
      const entry = btn.parentElement;
      const title = entry.querySelector("strong").innerText;
      const content = entry.querySelector("p").innerText;

      const newTitle = prompt("제목 수정", title);
      const newContent = prompt("내용 수정", content);

      if (newTitle && newContent) {
        entry.querySelector("strong").innerText = newTitle;
        entry.querySelector("p").innerText = newContent;
        saveData();
      }
    };
  });
}

loadData();
</script>

</body>
</html>
